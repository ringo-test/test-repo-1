name: checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  checks:
    uses: ringo-test/github-actions-common/.github/workflows/checks.yml@main
    with:
      eslint-config-file: ""
      max-image-size-mb: 4
      max-image-dimension: 2048
      require-meta: true
      detect-vietnamese-exclude: ""
      detect-vietnamese-scan-scene: false
      detect-vietnamese-scan-prefab: false
