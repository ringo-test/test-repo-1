name: pr

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - edited
      - reopened
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate-branch-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: ringo-test/github-actions-common/actions/validate-branch-and-pr@main
        with:
          branch-prefixes: feature,fix,refactor,chore,hotfix,test,docs
          pr-prefixes: feature,fix,refactor,hotfix`,docs
